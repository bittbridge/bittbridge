# Defaults are OFF, so experiment and enable combinations deliberately
# Keep track of your experiments to see what affects performance to find the sweet spot.

features:
  # Calendar fields: hour, minute, dayofweek, month
  use_time_features: false

  # Raw per-station weather columns. 
  # Empty = drop ALL of these (default).
  # tmpf = air temperature (°F), dwpf = dewpoint, relh = relative humidity,
  # sped = wind speed, drct = wind direction (degrees).
  # To use every group: [tmpf, dwpf, relh, sped, drct]
  include_weather_suffix_groups: []

  # hour + minute-of-day sine/cosine encodings
  use_cyclical_features: false
  
  # Per-station temperature / humidity / wind-speed aggregates (mean, std, min/max where applicable)
  # Add this if you want to use the temperature and humidity data to predict the load.
  use_station_agg_features: false

  # Per-station (tmpf - dwpf) plus mean/std across stations when pairs exist
  use_temp_dew_gap: false

  # Wind u/v components per station (speed * cos/sin(direction)) plus mean u/v
  use_wind_vector_features: false

  # Past Total Load columns load_lag_<k> (k rows back; 5-min cadence ⇒ k=12 is one hour).
  use_load_lags: false

  # Shifted rolling stats on load + load_delta_1/3/12 (notebook-style; exclusive with standalone deltas below).
  use_load_rolling: false

  # Standalone load_delta_1 and load_delta_12 when use_load_rolling is false.
  use_load_delta: false
  load_lag_steps: [24]
  rolling_load_windows: [3, 6]

# validation_split: last fraction of time-ordered train used for metrics; random_state seeds CART and LSTM.
# show_training_progress: phased [train] logs + timings; linear/cart have no intra-fit bar (sklearn).
training:
  validation_split: 0.2
  random_state: 42
  show_training_progress: true

# Hyperparameters; model choice is interactive miner or run_training_smoke.py --model.
models:
  linear:
    fit_intercept: true
  cart:
    max_depth: 6
    min_samples_split: 10
    min_samples_leaf: 5
  
  lstm:
    # If the process exits with only "Killed" (no Python traceback), the OS likely ran out of RAM.
    # Lower memory use: reduce batch_size, epochs, units, dense_units, and/or n_steps; add swap; use a larger VM.
    n_steps: 12
    units: 32
    dropout: 0.1
    epochs: 20
    batch_size: 32
    # Hidden Dense after LSTM (notebook-style). Set to 0 for LSTM → Dropout → Dense(1) only.
    dense_units: 16
    learning_rate: 0.001
    # validation_data + EarlyStopping on val_loss (matches typical notebook training).
    use_early_stopping: true
    early_stopping_patience: 5
    # Fit StandardScaler on training rows (per feature) before sequences; same transform at inference.
    standardize_inputs: false
    # Keras model.fit verbosity: 0=silent, 1=progress bar + ETA per epoch, 2=one line per epoch
    fit_verbose: 1

persistence:
  artifact_dir: miner_model_energy/artifacts
  save_on_deploy: true

# ------------------------------------------------------------
# DATA CONFIGURATION - DON NOT TOUCH THIS SECTION
# ------------------------------------------------------------
# CSV paths resolved at config load; files must exist or startup fails.
data:
  train_csv: miner_model_energy/TRAIN-updated-train-data_3-25-26.csv
  test_csv: miner_model_energy/TEST-03-25-2026-5min-single.csv